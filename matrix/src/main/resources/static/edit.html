<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuário - Matrix</title>
    <link rel="stylesheet" href="main.css">
    <style>
        input[type="date"] ~ label {
            display: none;
        }
        .form-box.register {
            overflow-y: auto;
            max-height: 85vh;
            padding-right: 15px;
        }
        h3 {
            color: #008F11;
            margin: 20px 0 10px;
            font-size: 1.2em;
            text-align: center;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
        }
        .btn-excluir {
            background: #8b0000;
            border: 1px solid #ff0000;
            margin-top: 15px;
            color: #fff;
        }
        .btn-excluir:hover {
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
            color: #fff;
        }
    </style>
</head>
<body>

<video autoplay muted loop playsinline id="matrix-video">
    <source src="imgs/matrix-fundo.mp4" type="video/mp4">
</video>

<div class="main-page-content">
    <header>
        <img class="logo" src="imgs/carro-matrix.png" alt="Locadora Matrix">
        <nav class="navigation">
            <a href="#">Home</a>
            <a href="#">Módulos</a>
            <a href="#">Suporte</a>
            <a href="#">Perfil</a>
            <button class="btnLogin-popup" onclick="window.location.href='login.html'">Sair</button>
        </nav>
    </header>

    <div class="wrapper">
        <div class="form-box register">
            <h2>Editar Usuário</h2>

            <form id="formEdicao">
                <h3>Dados Pessoais</h3>

                <div class="input-box">
                    <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
                    <input type="text" id="inputNome" required>
                    <label>Nome</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="id-card-outline"></ion-icon></span>
                    <input type="text" id="inputRg" required>
                    <label>RG</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="calendar-outline"></ion-icon></span>
                    <input type="date" id="inputDataNascimento" required>
                    <label>Data de Nascimento</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="transgender-outline"></ion-icon></span>
                    <input type="text" id="inputGenero" required>
                    <label>Gênero</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="call-outline"></ion-icon></span>
                    <input type="tel" id="inputCelular" required>
                    <label>Celular</label>
                </div>

                <h3>Endereço</h3>

                <div class="input-box">
                    <span class="icon"><ion-icon name="map-outline"></ion-icon></span>
                    <input type="text" id="inputCep" required>
                    <label>CEP</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="location-outline"></ion-icon></span>
                    <input type="text" id="inputLogradouro" required>
                    <label>Logradouro</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="pin-outline"></ion-icon></span>
                    <input type="text" id="inputNumero" required>
                    <label>Número</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="business-outline"></ion-icon></span>
                    <input type="text" id="inputBairro" required>
                    <label>Bairro</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="location-outline"></ion-icon></span>
                    <input type="text" id="inputMunicipio" required>
                    <label>Município</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="map-outline"></ion-icon></span>
                    <input type="text" id="inputEstado" maxlength="2" required>
                    <label>Estado (UF)</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="information-circle-outline"></ion-icon></span>
                    <input type="text" id="inputComplemento" required>
                    <label>Complemento</label>
                </div>

                <button type="button" class="btn" onclick="atualizarUsuario()">Salvar Alterações</button>
                <button type="button" class="btn btn-excluir" onclick="deletarUsuario()">Excluir Usuário</button>
            </form>
        </div>
    </div>
</div>

<script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const cpfDoUsuario = urlParams.get('cpf');

    const credenciais = localStorage.getItem('matrix_auth');

    if (!credenciais) {
        alert("Acesso negado! Você precisa fazer login primeiro.");
        window.location.href = "login.html";
    }

    const headersConfig = {
        'Content-Type': 'application/json',
        'Authorization': `Basic ${credenciais}`
    };

    window.onload = function() {
        if (!cpfDoUsuario) {
            alert("Erro: Nenhum CPF encontrado na URL para edição!");
            return;
        }

        fetch(`/api/usuarios/${cpfDoUsuario}`, { headers: headersConfig })
            .then(response => {
                if(!response.ok) throw new Error("Usuário não encontrado ou sem permissão.");
                return response.json();
            })
            .then(dados => {
                document.getElementById('inputNome').value = dados.nome || '';
                document.getElementById('inputRg').value = dados.rg || '';
                document.getElementById('inputDataNascimento').value = dados.dataNascimento || '';
                document.getElementById('inputGenero').value = dados.genero || '';
                document.getElementById('inputCelular').value = dados.celular || '';

                if (dados.endereco) {
                    document.getElementById('inputCep').value = dados.endereco.cep || '';
                    document.getElementById('inputLogradouro').value = dados.endereco.logradouro || '';
                    document.getElementById('inputNumero').value = dados.endereco.numero || '';
                    document.getElementById('inputBairro').value = dados.endereco.bairro || '';
                    document.getElementById('inputMunicipio').value = dados.endereco.municipio || '';
                    document.getElementById('inputEstado').value = dados.endereco.estado || '';
                    document.getElementById('inputComplemento').value = dados.endereco.complemento || '';
                }
            })
            .catch(error => {
                console.error("Erro ao carregar dados:", error);
                alert("Erro ao buscar os dados. Verifique se o login expirou.");
            });
    };


    function atualizarUsuario() {
        if (!cpfDoUsuario) return;

        const dadosAtualizados = {
            nome: document.getElementById('inputNome').value,
            rg: document.getElementById('inputRg').value,
            dataNascimento: document.getElementById('inputDataNascimento').value,
            genero: document.getElementById('inputGenero').value,
            celular: document.getElementById('inputCelular').value,
            endereco: {
                cep: document.getElementById('inputCep').value,
                logradouro: document.getElementById('inputLogradouro').value,
                numero: document.getElementById('inputNumero').value,
                bairro: document.getElementById('inputBairro').value,
                municipio: document.getElementById('inputMunicipio').value,
                estado: document.getElementById('inputEstado').value,
                complemento: document.getElementById('inputComplemento').value
            }
        };

        fetch(`/api/usuarios/${cpfDoUsuario}`, {
            method: 'PATCH',
            headers: headersConfig,
            body: JSON.stringify(dadosAtualizados)
        })
            .then(response => {
                if (response.ok) {
                    alert("Usuário atualizado com sucesso na Matrix!");
                    window.location.href = "users.html";
                } else {
                    alert("Falha ao atualizar os dados. Verifique os campos.");
                }
            })
            .catch(error => console.error("Erro:", error));
    }

    function deletarUsuario() {
        if (!cpfDoUsuario) return;

        if (confirm("Alerta Vermelho! Tem certeza que deseja deletar este usuário permanentemente?")) {
            fetch(`/api/usuarios/${cpfDoUsuario}`, {
                method: 'DELETE',
                headers: headersConfig
            })
                .then(response => {
                    if (response.status === 204) {
                        alert("Usuário deletado da Matrix!");
                        window.location.href = "users.html";
                    } else {
                        alert("Erro ao deletar usuário.");
                    }
                })
                .catch(error => console.error("Erro:", error));
        }
    }
</script>
</body>
</html>
